<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nasila's Boutique | Cloud Sync</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #b39359; --dark: #2c211a; --cream: #f9f4f0; --rose: #d67d7d; --white: #ffffff; --red: #e74c3c; }
        * { box-sizing: border-box; font-family: 'Times New Roman', serif; }
        body { margin: 0; background-color: var(--cream); color: var(--dark); }
        header { background: var(--white); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .logo { text-align: center; text-transform: uppercase; letter-spacing: 3px; font-weight: bold; }
        .screen { display: none; min-height: 100vh; width: 100%; }
        .active { display: block; }
        .hero { height: 60vh; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1610030469983-98e550d6193c?q=80&w=1000') center/cover; display: flex; flex-direction: column; justify-content: center; padding: 40px; color: white; }
        .btn-shop { background: var(--rose); color: white; padding: 12px 25px; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        .home-actions { padding: 30px 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .btn-home { width: 100%; max-width: 300px; padding: 15px; border: none; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; }
        .btn-billing-trigger { background: var(--gold); color: white; }
        .btn-editor-trigger { background: var(--dark); color: var(--gold); }
        .billing-ui { background: #000; color: white; padding: 20px; }
        .calc-display { background: #111; color: var(--gold); font-size: 3rem; padding: 15px; text-align: right; border: 1px solid var(--gold); border-radius: 8px; margin-bottom: 10px; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .num-btn { background: #222; color: white; border: 1px solid #444; padding: 20px; font-size: 1.5rem; border-radius: 8px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .dark-input { background: #222; color: white; border-color: var(--gold); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; color: black; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        .btn-remove { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div onclick="showScreen('home-screen')">☰</div>
        <div class="logo">NASILA'S BOUTIQUE</div>
        <div id="sync-indicator" style="color:red;">●</div>
    </header>

    <div id="home-screen" class="screen active">
        <div class="hero">
            <h1>NASILA'S BOUTIQUE</h1>
            <p>Elegance in every stitch.</p>
            <button class="btn-shop" onclick="showScreen('store-screen')">Shop Now</button>
        </div>
        <div class="home-actions">
            <button class="btn-home btn-billing-trigger" onclick="showScreen('billing-screen')">Billing Area</button>
            <button class="btn-home btn-editor-trigger" onclick="showScreen('editor-screen')">Editor Area</button>
        </div>
    </div>

    <div id="store-screen" class="screen" style="padding:20px;">
        <h2 style="text-align: center;">Our Collection</h2>
        <div id="store-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
        <button class="btn-shop" style="width:100%; margin-top:20px; background:var(--dark);" onclick="showScreen('home-screen')">Back</button>
    </div>

    <div id="billing-screen" class="screen billing-ui">
        <input type="text" id="billCustSearch" class="dark-input" placeholder="Search Customer" oninput="validateCustomer()">
        <p id="custVerifyMsg" style="color:#888;">Enter name to verify</p>
        <div class="calc-display" id="display">0</div>
        <div class="numpad">
            <button class="num-btn" onclick="press(1)">1</button><button class="num-btn" onclick="press(2)">2</button><button class="num-btn" onclick="press(3)">3</button>
            <button class="num-btn" onclick="press(4)">4</button><button class="num-btn" onclick="press(5)">5</button><button class="num-btn" onclick="press(6)">6</button>
            <button class="num-btn" onclick="press(7)">7</button><button class="num-btn" onclick="press(8)">8</button><button class="num-btn" onclick="press(9)">9</button>
            <button class="num-btn" onclick="displayVal=''; updateDisp();">C</button><button class="num-btn" onclick="press(0)">0</button>
            <button class="num-btn" style="background:var(--gold); color:black;" onclick="addToCart()">ENTER</button>
        </div>
        <table id="billTable" style="background:transparent; color:white;"></table>
        <h3 id="billTotal" style="color:var(--gold); text-align:right;">Total: ₹0</h3>
        <div id="payment-area" style="display:none;">
            <input type="number" id="billRec" class="dark-input" placeholder="Received Amount ₹" oninput="toggleFinish()">
            <button id="finishBtn" class="btn-shop" style="width:100%; background:#28a745; display:none;" onclick="completeSale()">Finish Sale</button>
        </div>
        <button class="btn-shop" style="width:100%; background:#444; margin-top:10px;" onclick="showScreen('home-screen')">Exit</button>
    </div>

    <div id="editor-screen" class="screen" style="padding:20px;">
        <h2>Management</h2>
        <button class="btn-home" style="background:var(--gold); color:white; margin-bottom:10px;" onclick="showScreen('cust-mgmt')">Customer Details</button>
        <button class="btn-home" style="background:var(--dark); color:var(--gold); margin-bottom:10px;" onclick="showScreen('stock-mgmt')">Stock List</button>
        <button class="btn-home" style="background:#555; color:white;" onclick="showScreen('home-screen')">Back</button>
    </div>

    <div id="cust-mgmt" class="screen" style="padding:20px;">
        <h3>Customer Database</h3>
        <input type="text" id="cName" placeholder="Name">
        <input type="text" id="cPhone" placeholder="Phone">
        <button class="btn-shop" onclick="addCustomer()">Save Customer</button>
        <table id="custTable"><thead><tr><th>Name</th><th>Balance</th><th>Action</th></tr></thead><tbody></tbody></table>
        <button class="btn-shop" style="background:#444; margin-top:10px;" onclick="showScreen('editor-screen')">Back</button>
    </div>

    <div id="stock-mgmt" class="screen" style="padding:20px;">
        <h3>Inventory Editor</h3>
        <input type="text" id="sCode" placeholder="Code">
        <input type="text" id="sName" placeholder="Item Name">
        <input type="number" id="sPrice" placeholder="Price">
        <input type="number" id="sQty" placeholder="Qty">
        <button class="btn-shop" onclick="saveStock()">Save Product</button>
        <table id="stockTable"><thead><tr><th>Code</th><th>Name</th><th>Price</th><th>Qty</th><th>Action</th></tr></thead><tbody></tbody></table>
        <button class="btn-shop" style="background:#444; margin-top:10px;" onclick="showScreen('editor-screen')">Back</button>
    </div>

    <script>
        // CONFIG FROM YOUR FIREBASE SETUP
        const firebaseConfig = {
          apiKey: "AIzaSyBR50RqhskA5sw048QfvMOHGz_qsBTACvQ",
          authDomain: "nasila-boutique.firebaseapp.com",
          projectId: "nasila-boutique",
          storageBucket: "nasila-boutique.firebasestorage.app",
          messagingSenderId: "654370810451",
          appId: "1:654370810451:web:4f251f7585d50cd025f4a6",
          measurementId: "G-1BL2CEYECF",
          databaseURL: "https://nasila-boutique-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let products = {};
        let customers = [];
        let cart = [];
        let displayVal = "";

        // SYNC DATA ACROSS DEVICES
        db.ref('products').on('value', (s) => { 
            products = s.val() || {}; 
            renderStock(); renderStore(); 
            document.getElementById('sync-indicator').style.color = "lightgreen";
        });
        db.ref('customers').on('value', (s) => { customers = s.val() || []; renderCustomers(); });

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function press(n) { displayVal += n; updateDisp(); }
        function updateDisp() { document.getElementById('display').innerText = displayVal || "0"; }

        function saveStock() {
            let code = document.getElementById('sCode').value;
            if(!code) return;
            products[code] = {
                name: document.getElementById('sName').value,
                price: parseInt(document.getElementById('sPrice').value) || 0,
                qty: parseInt(document.getElementById('sQty').value) || 0
            };
            db.ref('products').set(products);
            document.getElementById('sCode').value = ''; document.getElementById('sName').value = '';
        }

        function removeProduct(code) { if(confirm("Delete?")) { delete products[code]; db.ref('products').set(products); } }

        function renderStock() {
            let b = document.querySelector('#stockTable tbody'); b.innerHTML = "";
            for(let id in products) { b.innerHTML += `<tr><td>${id}</td><td>${products[id].name}</td><td>₹${products[id].price}</td><td>${products[id].qty}</td><td><button class="btn-remove" onclick="removeProduct('${id}')">X</button></td></tr>`; }
        }

        function renderStore() {
            let g = document.getElementById('store-grid'); g.innerHTML = "";
            for(let id in products) { g.innerHTML += `<div style="background:white; padding:10px; border-radius:8px;"><h4>${products[id].name}</h4><p>₹${products[id].price}</p><p>Stock: ${products[id].qty}</p></div>`; }
        }

        function addCustomer() {
            let name = document.getElementById('cName').value;
            if(!name) return;
            customers.push({ name, phone: document.getElementById('cPhone').value, balance: 0 });
            db.ref('customers').set(customers);
            document.getElementById('cName').value = '';
        }

        function renderCustomers() {
            let b = document.querySelector('#custTable tbody'); b.innerHTML = "";
            customers.forEach((c, i) => { b.innerHTML += `<tr><td>${c.name}</td><td>₹${c.balance}</td><td><button class="btn-remove" onclick="removeCustomer(${i})">X</button></td></tr>`; });
        }

        function removeCustomer(i) { if(confirm("Delete?")) { customers.splice(i, 1); db.ref('customers').set(customers); } }

        function addToCart() {
            if(products[displayVal]) { cart.push({...products[displayVal], code: displayVal}); renderCart(); }
            else { alert("Product not found!"); }
            displayVal = ""; updateDisp();
        }

        function renderCart() {
            let t = document.getElementById('billTable'); let total = 0; t.innerHTML = "";
            cart.forEach((item, i) => { total += item.price; t.innerHTML += `<tr><td style="color:white">${item.name}</td><td><button class="btn-remove" onclick="cart.splice(${i},1);renderCart()">X</button></td></tr>`; });
            document.getElementById('billTotal').innerText = "Total: ₹" + total;
            validateCustomer();
        }

        function validateCustomer() {
            let input = document.getElementById('billCustSearch').value.trim().toLowerCase();
            let found = customers.find(c => c.name.toLowerCase() === input);
            document.getElementById('custVerifyMsg').innerText = found ? "Verified: " + found.name : "Search customer to pay";
            document.getElementById('payment-area').style.display = found ? "block" : "none";
        }

        function toggleFinish() { document.getElementById('finishBtn').style.display = document.getElementById('billRec').value ? "block" : "none"; }

        function completeSale() {
            let total = parseInt(document.getElementById('billTotal').innerText.replace("Total: ₹",""));
            let rec = parseInt(document.getElementById('billRec').value) || 0;
            let custInput = document.getElementById('billCustSearch').value.toLowerCase();
            let found = customers.find(c => c.name.toLowerCase() === custInput);
            
            if(found && rec < total) found.balance += (total - rec);
            cart.forEach(item => { if(products[item.code]) products[item.code].qty--; });
            
            db.ref('products').set(products);
            db.ref('customers').set(customers);
            alert("Sale Complete & Synced!");
            location.reload();
        }
    </script>
</body>
</html>
